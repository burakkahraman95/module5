<!DOCTYPE html>
<html>
<head>
    <title>ShopFake - Online Store</title>
    <meta charset="UTF-8" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { font-family: sans-serif; background: #f5f5f5; color: #333; }

        header {
            background: #203a43;
            color: white;
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 { font-size: 26px; }

        .cart-link {
            background: PaleGreen;
            color: #203a43;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            box-shadow: 2px 2px 6px #00000033;
        }

        .banner {
            background: linear-gradient(90deg, #32d9ef, #ff89fd, #d9ef32);
            text-align: center;
            padding: 12px;
            font-weight: bold;
            font-size: 17px;
            color: #203a43;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 22px;
            margin-bottom: 24px;
            color: #203a43;
            border-left: 5px solid #32d9ef;
            padding-left: 12px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 3px 3px 10px #00000022;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .product-category {
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
        }

        .product-name { font-size: 17px; font-weight: bold; color: #203a43; }

        .product-description { font-size: 13px; color: #555; flex-grow: 1; }

        .product-price { font-size: 22px; font-weight: bold; color: #203a43; }

        .btn-add {
            background: PaleGreen;
            color: #203a43;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 6px #00000033;
            width: 100%;
        }

        .btn-add:hover { background: #32d9ef; }

        footer {
            background: #203a43;
            color: #aaa;
            text-align: center;
            padding: 20px;
            margin-top: 60px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <header>
        <h1>&#128722; ShopFake</h1>
        <a class="cart-link" href="/cart">&#128717; Cart ({{ cart_count }})</a>
    </header>

    <div class="banner">
        &#127873; Summer Sale &mdash; Up to 30% off selected items!
    </div>

    <div class="container">
        <h2 class="section-title">Our Products</h2>
        <div class="product-grid">
            {% for product in products %}
            <div class="product-card">
                <span class="product-category">{{ product.category }}</span>
                <div class="product-name">{{ product.name }}</div>
                <div class="product-description">{{ product.description }}</div>
                <div class="product-price">${{ "%.2f"|format(product.price) }}</div>
                <form action="/add_to_cart/{{ product.id }}" method="post">
                    <button class="btn-add" type="submit">Add to Cart</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>

    <footer>&copy; 2026 ShopFake Inc. &mdash; All rights reserved.</footer>

</body>
</html>
